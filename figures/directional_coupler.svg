<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <style>
    .wg1 { fill: none; stroke: #2a4d6e; stroke-width: 4; }
    .wg2 { fill: none; stroke: #b85c2c; stroke-width: 4; }
    .label { font: 14px sans-serif; fill: #1c1814; }
    .label-i { font: italic 14px serif; fill: #1c1814; }
    .arrow1 { fill: #2a4d6e; }
    .arrow2 { fill: #b85c2c; }
    .dim { fill: none; stroke: #777; stroke-width: 1; stroke-dasharray: 4 3; }
    .dim-text { font: 12px sans-serif; fill: #777; }
  </style>

  <!-- Two waveguides bend together for coupling section, then bend apart -->
  <!-- Top waveguide -->
  <path class="wg1" d="M 30 60 L 180 60 Q 220 60 230 95 L 230 145 L 370 145 L 370 95 Q 380 60 420 60 L 570 60" />

  <!-- Bottom waveguide -->
  <path class="wg2" d="M 30 230 L 180 230 Q 220 230 230 195 L 230 155 L 370 155 L 370 195 Q 380 230 420 230 L 570 230" />

  <!-- Coupling region indicators -->
  <line class="dim" x1="245" y1="100" x2="245" y2="200" />
  <line class="dim" x1="355" y1="100" x2="355" y2="200" />
  <text class="dim-text" x="300" y="98" text-anchor="middle">coupling region (length L_c)</text>

  <!-- field amplitudes -->
  <text class="label-i" x="50" y="50" text-anchor="middle">a₁</text>
  <text class="label-i" x="550" y="50" text-anchor="middle">b₁</text>
  <text class="label-i" x="50" y="252" text-anchor="middle">a₂</text>
  <text class="label-i" x="550" y="252" text-anchor="middle">b₂</text>

  <!-- arrows showing direction -->
  <polygon class="arrow1" points="100,55 115,60 100,65" />
  <polygon class="arrow1" points="490,55 505,60 490,65" />
  <polygon class="arrow2" points="100,225 115,230 100,235" />
  <polygon class="arrow2" points="490,225 505,230 490,235" />

  <!-- DC scattering matrix annotation -->
  <text class="label" x="300" y="280" text-anchor="middle" style="font-style:italic">scattering matrix</text>
  <text class="label" x="300" y="305" text-anchor="middle">(b₁, b₂) = M (a₁, a₂),  M = ((t, iκ), (iκ, t)),  t² + κ² = 1 (lossless)</text>
</svg>

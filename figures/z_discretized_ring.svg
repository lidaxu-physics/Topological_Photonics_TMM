<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <style>
    .ring { fill: none; stroke: #2a4d6e; stroke-width: 3; }
    .grid-pt { fill: #b85c2c; }
    .grid-pt-bus { fill: #2a6e6a; stroke: #1c1814; stroke-width: 1; }
    .label { font: 13px sans-serif; fill: #1c1814; }
    .label-small { font: 11px sans-serif; fill: #777; }
    .label-i { font: italic 14px serif; fill: #1c1814; }
    .arrow { fill: #1c1814; }
    .bus { fill: none; stroke: #2a6e6a; stroke-width: 3; }
  </style>

  <!-- Ring -->
  <circle class="ring" cx="250" cy="250" r="160" />

  <!-- Grid points (Nz = 16) -->
  <g id="grid">
    <circle class="grid-pt" cx="410" cy="250" r="6" />            <!-- k=0 -->
    <circle class="grid-pt" cx="397.7" cy="188.8" r="5" />        <!-- k=1 -->
    <circle class="grid-pt" cx="363.1" cy="136.9" r="5" />        <!-- k=2 -->
    <circle class="grid-pt" cx="311.2" cy="102.3" r="5" />        <!-- k=3 -->
    <circle class="grid-pt" cx="250" cy="90" r="6" />              <!-- k=4 -->
    <circle class="grid-pt" cx="188.8" cy="102.3" r="5" />
    <circle class="grid-pt" cx="136.9" cy="136.9" r="5" />
    <circle class="grid-pt" cx="102.3" cy="188.8" r="5" />
    <circle class="grid-pt" cx="90" cy="250" r="6" />              <!-- k=8 -->
    <circle class="grid-pt" cx="102.3" cy="311.2" r="5" />
    <circle class="grid-pt" cx="136.9" cy="363.1" r="5" />
    <circle class="grid-pt" cx="188.8" cy="397.7" r="5" />
    <circle class="grid-pt-bus" cx="250" cy="410" r="6" />        <!-- k=12 (bus) -->
    <circle class="grid-pt" cx="311.2" cy="397.7" r="5" />
    <circle class="grid-pt" cx="363.1" cy="363.1" r="5" />
    <circle class="grid-pt" cx="397.7" cy="311.2" r="5" />
  </g>

  <!-- Labels (CCW: from k=0 at 3-o'clock going up toward 12 then around) -->
  <text class="label" x="430" y="255">k=0</text>
  <text class="label" x="240" y="80">k=4</text>
  <text class="label" x="55" y="255">k=8</text>
  <text class="label" x="260" y="430">k=12 (DC)</text>

  <!-- CCW arrow: counterclockwise circulation. Sweep from upper-right to upper-left -->
  <path d="M 290 200 A 60 60 0 0 0 210 200" fill="none" stroke="#1c1814" stroke-width="2.5" />
  <polygon class="arrow" points="215,210 200,200 220,195" />
  <text class="label-i" x="250" y="260" text-anchor="middle">z increasing</text>
  <text class="label-small" x="250" y="278" text-anchor="middle">(CCW)</text>

  <!-- Bus waveguide -->
  <path class="bus" d="M 100 460 L 200 460 Q 230 460 240 440 Q 250 420 280 420 L 290 420" />
  <path class="bus" d="M 290 420 Q 320 420 330 440 Q 340 460 370 460 L 470 460" />
  <text class="label" x="100" y="478" style="fill:#2a6e6a">input bus</text>

  <!-- propagation step annotation -->
  <text class="label-i" x="250" y="40" text-anchor="middle">E[k] = e^(iω·Δz - α·Δz/2) · E[k-1]</text>
  <text class="label-small" x="250" y="58" text-anchor="middle">(free propagation between non-DC grid points)</text>
</svg>

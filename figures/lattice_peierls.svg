<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <style>
    .site-ring { fill: none; stroke: #b85c2c; stroke-width: 3; }
    .link-h { fill: none; stroke: #2a6e6a; stroke-width: 2.5; }
    .link-v { fill: none; stroke: #4a4d8e; stroke-width: 2.5; }
    .bond { fill: none; stroke: #777; stroke-width: 1; stroke-dasharray: 3 3; }
    .label-site { font: 11px sans-serif; fill: #1c1814; font-weight: bold; }
    .label-link { font: 10px sans-serif; fill: #555; }
    .label-flux { font: italic 14px serif; fill: #c54f3f; }
    .label-title { font: bold 14px sans-serif; fill: #1c1814; }
    .arrow-ccw { fill: none; stroke: #c54f3f; stroke-width: 2; }
  </style>

  <!-- Title -->
  <text class="label-title" x="300" y="22" text-anchor="middle">3×3 portion of the lattice — sites, link rings, and per-row Peierls phase</text>

  <!-- Grid: site rings at (i, j) for i,j in {0,1,2} -->
  <!-- Spacing 160, origin at (100, 480) -->
  <!-- Bond lines first (under) -->
  <g>
    <line class="bond" x1="100" y1="480" x2="260" y2="480" />
    <line class="bond" x1="260" y1="480" x2="420" y2="480" />
    <line class="bond" x1="100" y1="320" x2="260" y2="320" />
    <line class="bond" x1="260" y1="320" x2="420" y2="320" />
    <line class="bond" x1="100" y1="160" x2="260" y2="160" />
    <line class="bond" x1="260" y1="160" x2="420" y2="160" />
    <line class="bond" x1="100" y1="480" x2="100" y2="320" />
    <line class="bond" x1="100" y1="320" x2="100" y2="160" />
    <line class="bond" x1="260" y1="480" x2="260" y2="320" />
    <line class="bond" x1="260" y1="320" x2="260" y2="160" />
    <line class="bond" x1="420" y1="480" x2="420" y2="320" />
    <line class="bond" x1="420" y1="320" x2="420" y2="160" />
  </g>

  <!-- Site rings -->
  <g>
    <circle class="site-ring" cx="100" cy="480" r="22" />
    <circle class="site-ring" cx="260" cy="480" r="22" />
    <circle class="site-ring" cx="420" cy="480" r="22" />
    <circle class="site-ring" cx="100" cy="320" r="22" />
    <circle class="site-ring" cx="260" cy="320" r="22" />
    <circle class="site-ring" cx="420" cy="320" r="22" />
    <circle class="site-ring" cx="100" cy="160" r="22" />
    <circle class="site-ring" cx="260" cy="160" r="22" />
    <circle class="site-ring" cx="420" cy="160" r="22" />
  </g>

  <!-- Site labels -->
  <text class="label-site" x="100" y="484" text-anchor="middle">(0,0)</text>
  <text class="label-site" x="260" y="484" text-anchor="middle">(1,0)</text>
  <text class="label-site" x="420" y="484" text-anchor="middle">(2,0)</text>
  <text class="label-site" x="100" y="324" text-anchor="middle">(0,1)</text>
  <text class="label-site" x="260" y="324" text-anchor="middle">(1,1)</text>
  <text class="label-site" x="420" y="324" text-anchor="middle">(2,1)</text>
  <text class="label-site" x="100" y="164" text-anchor="middle">(0,2)</text>
  <text class="label-site" x="260" y="164" text-anchor="middle">(1,2)</text>
  <text class="label-site" x="420" y="164" text-anchor="middle">(2,2)</text>

  <!-- Horizontal link rings (smaller, between sites) -->
  <g>
    <!-- Row y=0 -->
    <circle class="link-h" cx="180" cy="480" r="13" />
    <circle class="link-h" cx="340" cy="480" r="13" />
    <!-- Row y=1 -->
    <circle class="link-h" cx="180" cy="320" r="13" />
    <circle class="link-h" cx="340" cy="320" r="13" />
    <!-- Row y=2 -->
    <circle class="link-h" cx="180" cy="160" r="13" />
    <circle class="link-h" cx="340" cy="160" r="13" />
  </g>

  <!-- Vertical link rings -->
  <g>
    <circle class="link-v" cx="100" cy="400" r="13" />
    <circle class="link-v" cx="260" cy="400" r="13" />
    <circle class="link-v" cx="420" cy="400" r="13" />
    <circle class="link-v" cx="100" cy="240" r="13" />
    <circle class="link-v" cx="260" cy="240" r="13" />
    <circle class="link-v" cx="420" cy="240" r="13" />
  </g>

  <!-- Annotations: per-row h-link phases -->
  <text class="label-link" x="500" y="484" style="fill:#2a6e6a">θ_h(0) = 0</text>
  <text class="label-link" x="500" y="324" style="fill:#2a6e6a">θ_h(1) = −2Φ₀</text>
  <text class="label-link" x="500" y="164" style="fill:#2a6e6a">θ_h(2) = −4Φ₀</text>

  <!-- v-link phases all 0 -->
  <text class="label-link" x="40" y="404" style="fill:#4a4d8e" text-anchor="end">θ_v=0</text>
  <text class="label-link" x="40" y="244" style="fill:#4a4d8e" text-anchor="end">θ_v=0</text>

  <!-- Plaquette flux annotation in one plaquette -->
  <g>
    <!-- Bottom-left plaquette at (0,0)-(1,0)-(1,1)-(0,1), CCW arrow in middle -->
    <path class="arrow-ccw" d="M 150 460 Q 180 410 150 360" />
    <polygon points="150,360 145,375 158,370" fill="#c54f3f" />
    <text class="label-flux" x="180" y="408" text-anchor="middle">Φ₀</text>
  </g>
  <g>
    <!-- Top-left plaquette -->
    <path class="arrow-ccw" d="M 150 300 Q 180 250 150 200" />
    <polygon points="150,200 145,215 158,210" fill="#c54f3f" />
    <text class="label-flux" x="180" y="248" text-anchor="middle">Φ₀</text>
  </g>
  <g>
    <!-- Bottom-right plaquette -->
    <path class="arrow-ccw" d="M 310 460 Q 340 410 310 360" />
    <polygon points="310,360 305,375 318,370" fill="#c54f3f" />
    <text class="label-flux" x="340" y="408" text-anchor="middle">Φ₀</text>
  </g>
  <g>
    <!-- Top-right plaquette -->
    <path class="arrow-ccw" d="M 310 300 Q 340 250 310 200" />
    <polygon points="310,200 305,215 318,210" fill="#c54f3f" />
    <text class="label-flux" x="340" y="248" text-anchor="middle">Φ₀</text>
  </g>

  <!-- Legend -->
  <g>
    <circle class="site-ring" cx="65" cy="555" r="10" />
    <text class="label-link" x="80" y="558">site ring</text>
    <circle class="link-h" cx="170" cy="555" r="8" />
    <text class="label-link" x="183" y="558">h-link (Peierls phase)</text>
    <circle class="link-v" cx="350" cy="555" r="8" />
    <text class="label-link" x="363" y="558">v-link (no phase)</text>
  </g>
</svg>
